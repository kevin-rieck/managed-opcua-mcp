# This example omits controls, so no Control Surface is exposed.
# OPC UA Server credentials and roles enforce read authorization.

version: 1

connection:
  endpointUrl: opc.tcp://localhost:4840
  securityMode: None
  securityPolicy: None
  auth:
    type: anonymous

read:
  defaultBrowseDepth: 1
  maxBrowseDepth: 10
  maxReadBatchSize: 50
  roots:
    - nodeId: ns=2;s=Machine
      label: machine
      description: Main machine address space.

audit:
  file: ./audit.jsonl
  maxReasonLength: 1000
